schema_version = "0.1"

[workspace]
name = "monad"
kind = "polyglot-repo-runtime"
root = "."

[adapters]
rust = true
bun = true
python = false
go = false

[policy]
non_destructive_sync = true
record_provenance = true
require_dry_run_for_existing_repos = true

[commands]
check = ["rust:fmt", "rust:clippy", "rust:test"]